<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
    <ui:composition template="/templates/template.xhtml">
        <ui:define name="titulo">Relatórios de Entregas</ui:define>
        <ui:define name="conteudo">
            <h:form id="formRelatorio">
                <p:panel header="Filtros do Relatório">
                    <p:panelGrid columns="2" styleClass="ui-panelgrid-blank">
                        <p:outputLabel value="Entregador:" for="entregador"/>
                        <h:selectOneMenu id="entregador" value="#{relatorioController.entregadorId}">
                            <f:selectItem itemLabel="Todos os Entregadores" itemValue="-1"/>
                            <f:selectItems value="#{relatorioController.listaEntregadores}" var="ent"
                                           itemLabel="#{ent.nome}" itemValue="#{ent.id}"/>
                        </h:selectOneMenu>

                        <p:outputLabel value="Cidade do Cliente:" for="cidade"/>
                        <p:inputText id="cidade" value="#{relatorioController.cidade}"
                                     placeholder="Digite parte do nome da cidade..." size="40"/>

                        <p:outputLabel value="Encomendas de Pequeno Preço (menor que):" for="valor"/>
                        <p:inputText id="valor" value="#{relatorioController.valorMaximo}"
                                     placeholder="Digite um valor...">
                            <f:convertNumber type="number" minFractionDigits="2" maxFractionDigits="2"/>
                        </p:inputText>
                    </p:panelGrid>

                    <p:commandButton value="Gerar Relatório" icon="pi pi-search"
                        actionListener="#{relatorioController.gerarRelatorio}"
                        update="@form"/>
                    <p:commandButton value="Limpar" icon="pi pi-times"
                        actionListener="#{relatorioController.limpar}"
                        update="@form"/>
                </p:panel>

                <p:panel header="Resultado" rendered="#{relatorioController.resultado != null}">
                    <p:dataTable value="#{relatorioController.resultado}" var="item"
                                 emptyMessage="Nenhuma encomenda encontrada com os filtros informados."
                                 paginator="true" rows="10">
                        <p:column headerText="Código Rastreio">
                            #{item.codigoRastreio}
                        </p:column>
                        <p:column headerText="Valor">
                            <h:outputText value="#{item.valor}">
                                <f:convertNumber type="currency" currencySymbol="R$" locale="pt_BR"/>
                            </h:outputText>
                        </p:column>
                        <p:column headerText="Cliente">
                            #{item.cliente.nome}
                        </p:column>
                        <p:column headerText="CPF do Cliente">
                            <h:outputText value="#{item.cliente.cpf}">
                                <f:converter converterId="cpfConverter"/>
                            </h:outputText>
                        </p:column>
                        <p:column headerText="Cidade">
                            #{item.cliente.endereco.cidade}
                        </p:column>
                        <p:column headerText="Entregador">
                            #{item.entregador.nome}
                        </p:column>
                    </p:dataTable>
                </p:panel>
            </h:form>
        </ui:define>
    </ui:composition>
</html>
