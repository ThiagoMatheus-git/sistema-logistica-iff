<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
    <ui:composition template="/templates/template.xhtml">
        <ui:define name="titulo">Página Inicial</ui:define>
        <ui:define name="conteudo">
            <p:panel header="Bem-vindo ao Sistema de Logística" style="text-align: center; margin-top: 50px;">
                <h:panelGrid columns="2" cellpadding="15" style="margin: 0 auto;">
                    <p:link outcome="/privado/cliente/listar" styleClass="link-inicio">
                        <p:panel header="Gerenciar Clientes" style="width: 250px; text-align: center;">
                            <i class="pi pi-users" style="font-size: 3em; color: #2196F3;"></i>
                            <p>Cadastro e gerenciamento de clientes</p>
                        </p:panel>
                    </p:link>

                    <p:link outcome="/privado/entregador/listar" styleClass="link-inicio">
                        <p:panel header="Gerenciar Entregadores" style="width: 250px; text-align: center;">
                            <i class="pi pi-car" style="font-size: 3em; color: #4CAF50;"></i>
                            <p>Cadastro e gerenciamento de entregadores</p>
                        </p:panel>
                    </p:link>

                    <p:link outcome="/privado/encomenda/listar" styleClass="link-inicio">
                        <p:panel header="Registrar Encomendas" style="width: 250px; text-align: center;">
                            <i class="pi pi-box" style="font-size: 3em; color: #FF9800;"></i>
                            <p>Registro e controle de encomendas</p>
                        </p:panel>
                    </p:link>

                    <p:link outcome="/privado/relatorio/listar" styleClass="link-inicio">
                        <p:panel header="Relatórios de Entregas" style="width: 250px; text-align: center;">
                            <i class="pi pi-chart-bar" style="font-size: 3em; color: #9C27B0;"></i>
                            <p>Relatórios e filtros de entregas</p>
                        </p:panel>
                    </p:link>
                </h:panelGrid>
            </p:panel>
        </ui:define>
    </ui:composition>
</html>
